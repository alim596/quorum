name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  consensus:
    name: Consensus (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Vet
        run: go vet ./...
      - name: Unit tests + 40-seed chaos simulation (race detector on)
        run: go test -race ./...

  lab:
    name: Lab UI (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lab/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
